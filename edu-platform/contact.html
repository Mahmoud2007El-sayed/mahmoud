<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا | أكاديمية نُقطة</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <h1 class="logo">أكاديمية نُقطة</h1>
      <button id="menuBtn" class="menu-btn">☰</button>
      <ul id="navLinks" class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="courses.html">الدورات</a></li>
        <li><a href="about.html">من نحن</a></li>
        <li><a href="contact.html" class="active">تواصل</a></li>
      </ul>
    </nav>
  </header>

  <main class="container section">
    <h2>نموذج التواصل</h2>
    <form id="contactForm" class="form">
      <input name="name" class="input" placeholder="الاسم الكامل" required />
      <input name="email" type="email" class="input" placeholder="البريد الإلكتروني" required />
      <textarea name="message" class="input" placeholder="اكتب رسالتك" rows="6" required></textarea>
      <button class="btn" type="submit">إرسال</button>
    </form>
    <p id="formStatus" class="status"></p>
  </main>

  <footer class="site-footer"><p>© 2026 أكاديمية نُقطة</p></footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
